# Accessibility checks at WCAG 2.2 AAA using Pa11y and axe-core.
#
# Chrome version drift fix (must be applied to every team repo):
#   GitHub Actions updates the runner's system Chrome frequently. Pa11y uses
#   bundled puppeteer-core, which looks for Chrome in ~/.cache/puppeteer at an
#   exact version path. When the runner Chrome version changes, puppeteer-core
#   cannot find it and Pa11y fails with "Could not find Chrome".
#
#   Two-part fix:
#   1. Pa11y: generate a pa11y.ci.json at CI time using jq, overriding
#      chromeLaunchConfig.executablePath to the system Chrome path. Pa11y then
#      uses the runner's Chrome directly, bypassing the Puppeteer cache.
#   2. axe-core: detect the full 4-part Chrome version from the binary
#      ChromeDriver probes first, then download the exact matching ChromeDriver
#      from the Chrome for Testing CDN
#      (storage.googleapis.com/chrome-for-testing-public). Store the path in
#      GITHUB_ENV and pass it to axe via --chromedriver-path so the driver
#      and browser are always the same version regardless of what is in PATH.
#
#   The pa11y.json in the project root is the base config; pa11y.ci.json is
#   generated at CI time and must not be committed to the repository.
#
# Known limitation: the app may require JavaScript execution to render.
# Pa11y and axe-core run against the served HTML; full rendered-interface
# testing is Carol's responsibility in her manual test pass.
#
# Adapt the "Serve the site" step and URLs to this project's stack.
#
# Accessibility tool versions (pa11y, @axe-core/cli, wait-on) are managed in
# .github/accessibility-tools/package.json. Dependabot tracks that manifest and
# proposes version bumps automatically. Action SHAs are pinned below and are
# updated by Dependabot when new releases are published.

name: Accessibility
on:
  pull_request:

permissions:
  contents: read

jobs:
  accessibility:
    name: Pa11y and axe at WCAG 2.2 AAA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*

      - name: Install accessibility tools
        # Tools are managed in .github/accessibility-tools/package.json so
        # Dependabot can track and propose version bumps automatically.
        run: npm ci
        working-directory: .github/accessibility-tools

      - name: Add accessibility tools to PATH
        run: echo "$GITHUB_WORKSPACE/.github/accessibility-tools/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Install matching ChromeDriver for axe-core
        run: |
          # Detect the full Chrome version from the binary ChromeDriver uses.
          # Probe in the same order ChromeDriver checks binaries.
          CHROME_FULL=""
          for chrome_bin in /opt/google/chrome/chrome /opt/google/chrome/google-chrome \
              /usr/bin/google-chrome /usr/bin/google-chrome-stable; do
            if [ -x "$chrome_bin" ]; then
              CHROME_FULL=$("$chrome_bin" --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              break
            fi
          done
          if [ -z "$CHROME_FULL" ]; then
            echo "WARNING: Could not detect Chrome version; axe will use system ChromeDriver." && exit 0
          fi
          echo "Detected Chrome ${CHROME_FULL}."
          # Download the exact matching ChromeDriver from the Chrome for Testing CDN.
          mkdir -p "$HOME/chromedriver-matching"
          if curl -sfL \
              "https://storage.googleapis.com/chrome-for-testing-public/${CHROME_FULL}/linux64/chromedriver-linux64.zip" \
              -o /tmp/chromedriver.zip; then
            unzip -q /tmp/chromedriver.zip -d /tmp/chromedriver-extract
            install -m 0755 /tmp/chromedriver-extract/chromedriver-linux64/chromedriver \
              "$HOME/chromedriver-matching/chromedriver"
            echo "CHROMEDRIVER_PATH=$HOME/chromedriver-matching/chromedriver" >> "$GITHUB_ENV"
            echo "Installed ChromeDriver ${CHROME_FULL}."
          else
            echo "WARNING: CDN download failed; axe will use system ChromeDriver."
          fi

      - name: Build CI pa11y config with system Chrome path
        run: |
          CHROME=$(which google-chrome-stable 2>/dev/null || which google-chrome 2>/dev/null || which chromium 2>/dev/null)
          jq --arg chrome "$CHROME" '.chromeLaunchConfig.executablePath = $chrome' pa11y.json > pa11y.ci.json

      - name: Serve the site in the background
        run: python3 -m http.server 8080 &

      - name: Wait for the server to be ready
        run: wait-on http://localhost:8080 --timeout 15000

      - name: Pa11y at WCAG 2.2 AAA
        run: pa11y --standard WCAG2AAA --config pa11y.ci.json http://localhost:8080/index.html

      - name: axe-core at WCAG 2.2 AAA
        run: |
          if [ -n "${CHROMEDRIVER_PATH:-}" ]; then
            axe http://localhost:8080/index.html --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa --chrome-options=no-sandbox --chromedriver-path "$CHROMEDRIVER_PATH"
          else
            axe http://localhost:8080/index.html --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa --chrome-options=no-sandbox
          fi

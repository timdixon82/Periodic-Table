# Accessibility checks at WCAG 2.2 AAA using axe-core and Pa11y.
#
# Runs on every pull request. Serves the static site locally with Python's
# built-in HTTP server on port 8080, then runs both tools against it.
#
# No untrusted GitHub context variables are used in run steps.
#
# Action versions are pinned to commit SHAs verified on 2026-05-21.

name: Accessibility
on:
  pull_request:

permissions:
  contents: read

jobs:
  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*

      - name: Install accessibility tools
        run: npm install -g pa11y @axe-core/cli wait-on

      - name: Serve the site
        run: python3 -m http.server 8080 &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Pa11y at WCAG 2.2 AAA
        # --chromium-arg="--no-sandbox" is required because GitHub Actions
        # runners execute as root in a Docker container, where Chromium refuses
        # to run without --no-sandbox.
        run: pa11y --standard WCAG2AAA --chromium-arg="--no-sandbox" "http://localhost:8080"

      - name: axe-core at WCAG 2.2 AAA
        # --chrome-options="no-sandbox" is required for the same reason as the
        # pa11y step above.
        run: axe "http://localhost:8080" --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa --chrome-options="no-sandbox"

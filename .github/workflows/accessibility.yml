# Accessibility checks at WCAG 2.2 AAA using axe-core and Pa11y.
#
# Runs on every pull request. Serves the static site locally with Python's
# built-in HTTP server on port 8080, then runs both tools against it.
#
# No untrusted GitHub context variables are used in run steps.
#
# Action versions are pinned to commit SHAs verified on 2026-05-21.

name: Accessibility
on:
  pull_request:

permissions:
  contents: read

jobs:
  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*

      - name: Install accessibility tools
        run: npm install -g pa11y @axe-core/cli@4.11.3 wait-on@8.0.1

      - name: Install matching ChromeDriver for axe-core
        run: |
          # Detect the full Chrome version from the binary ChromeDriver uses.
          # Probe in the same order ChromeDriver checks binaries.
          CHROME_FULL=""
          for chrome_bin in /opt/google/chrome/chrome /opt/google/chrome/google-chrome \
              /usr/bin/google-chrome /usr/bin/google-chrome-stable; do
            if [ -x "$chrome_bin" ]; then
              CHROME_FULL=$("$chrome_bin" --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              break
            fi
          done
          if [ -z "$CHROME_FULL" ]; then
            echo "WARNING: Could not detect Chrome version; axe will use system ChromeDriver." && exit 0
          fi
          echo "Detected Chrome ${CHROME_FULL}."
          mkdir -p "$HOME/chromedriver-matching"
          if curl -sfL \
              "https://storage.googleapis.com/chrome-for-testing-public/${CHROME_FULL}/linux64/chromedriver-linux64.zip" \
              -o /tmp/chromedriver.zip; then
            unzip -q /tmp/chromedriver.zip -d /tmp/chromedriver-extract
            install -m 0755 /tmp/chromedriver-extract/chromedriver-linux64/chromedriver \
              "$HOME/chromedriver-matching/chromedriver"
            echo "CHROMEDRIVER_PATH=$HOME/chromedriver-matching/chromedriver" >> "$GITHUB_ENV"
            echo "Installed ChromeDriver ${CHROME_FULL}."
          else
            echo "WARNING: CDN download failed; axe will use system ChromeDriver."
          fi

      - name: Build CI pa11y config with system Chrome path
        run: |
          CHROME=$(which google-chrome-stable 2>/dev/null || which google-chrome 2>/dev/null || which chromium 2>/dev/null)
          jq --arg chrome "$CHROME" '.chromeLaunchConfig.executablePath = $chrome' pa11y.json > pa11y.ci.json

      - name: Serve the site
        run: python3 -m http.server 8080 &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:8080 --timeout 15000

      - name: Pa11y at WCAG 2.2 AAA
        # pa11y picks up pa11y.json in the repository root, which sets
        # chromeLaunchConfig.args to include --no-sandbox. This is required
        # because GitHub Actions runners execute as root in a Docker container,
        # where Chromium refuses to run without --no-sandbox.
        run: pa11y --standard WCAG2AAA --config pa11y.ci.json "http://localhost:8080"

      - name: axe-core at WCAG 2.2 AAA
        # --chrome-options="no-sandbox" passes --no-sandbox to the Chromium
        # process launched by the axe-core CLI. Required on GitHub Actions
        # runners which run as root.
        run: |
          if [ -n "${CHROMEDRIVER_PATH:-}" ]; then
            axe "http://localhost:8080" --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa --chrome-options="no-sandbox" --chromedriver-path "$CHROMEDRIVER_PATH"
          else
            axe "http://localhost:8080" --tags wcag2a,wcag2aa,wcag2aaa,wcag22aa,wcag22aaa --chrome-options="no-sandbox"
          fi

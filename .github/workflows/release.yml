# Release automation with release-please.
# The only GitHub expression is secrets.GITHUB_TOKEN, which is a safe
# built-in secret, not an untrusted user-supplied value.
# Action SHAs verified 2026-05-21.

name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

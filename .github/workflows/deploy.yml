# Deploy to GitHub Pages.
# Runs on every push to main and on manual dispatch.
#
# THIS IS THE TEAM STANDARD for deploying a static site to GitHub Pages.
# See docs/patterns/github-pages-deploy.md for the full standard.
#
# Activation (one-time, per repo): GitHub > Settings > Pages > Build and
# deployment > Source > "GitHub Actions" (NOT "Deploy from a branch").
# Equivalently, set the Pages build_type to "workflow" via the API.
#
# Action SHAs are pinned to FULL 40-character commit SHAs. Never use a
# shortened SHA: GitHub no longer resolves them and the deploy will fail
# (this caused a silent stale-deploy on the Image Colour Contrast Checker).
# The version tag is in the trailing comment; update SHAs via Dependabot.
#
# ── CHOOSE ONE VARIANT ────────────────────────────────────────────────────────
#
# BUNDLED projects: a build step emits an output folder (e.g. dist).
#   - Keep the BUNDLED JOB section below (the default).
#   - Delete or comment out the UNBUNDLED JOB section.
#
# UNBUNDLED static projects: files served straight from the repo root, no
# build step (e.g. SWOT Builder). An "Assemble site" step copies runtime
# files into _site, excluding node_modules / .github / docs / config files.
#   - Keep the UNBUNDLED JOB section below.
#   - Delete or comment out the BUNDLED JOB section.
#
# See docs/patterns/github-pages-deploy.md for full guidance, SHAs, and
# notes on post-merge live-site verification.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. In-progress deploy is cancelled if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-unbundled:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Assemble site
        run: |
          mkdir _site
          rsync -av \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='.claude' \
            --exclude='.github' \
            --exclude='docs' \
            --exclude='scripts' \
            --exclude='tests' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='eslint.config.js' \
            --exclude='.stylelintrc.json' \
            --exclude='.editorconfig' \
            --exclude='.gitignore' \
            --exclude='.htmlvalidate.json' \
            --exclude='.release-please-manifest.json' \
            --exclude='pa11y.json' \
            --exclude='release-please-config.json' \
            --exclude='playwright.config.js' \
            --exclude='CHANGELOG.md' \
            --exclude='CLAUDE.md' \
            --exclude='README.md' \
            --exclude='VERSION' \
            --exclude='todo.md' \
            . _site/
            # Adjust excludes if the root contains other non-serving files.

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy-unbundled:
    needs: build-unbundled
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

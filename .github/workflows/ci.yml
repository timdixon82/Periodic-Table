# Continuous integration for the Periodic-Table static front-end.
#
# Runs on every pull request and on pushes to main.
# Lints HTML (html-validate), CSS (stylelint), and JavaScript (eslint).
#
# Security note: no untrusted GitHub context variables (issue titles, PR
# bodies, commit messages, etc.) are interpolated into any run: step.
# All run commands are fixed strings with no user-controlled input.
#
# Action versions are pinned to commit SHAs verified on 2026-05-21.
# To update an action, change the SHA and the trailing version comment together.

name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint HTML
        run: npx html-validate index.html

      - name: Lint CSS
        run: npx stylelint "css/**/*.css"

      - name: Lint JavaScript
        run: npx eslint "js/**/*.js"
